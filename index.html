<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" data-target="home">Home</button>
        <button class="tab-btn" data-target="games">Games</button>
        <button class="tab-btn" data-target="stream">Stream</button>
        <button class="tab-btn" data-target="message-board">Message Board</button>
    </div>

    <div id="home" class="content active">
        <h2>Home</h2>
        <p>Hi babe! I love you 🥰</p>
        <p>Version 1.0.1</p>
    </div>

    <div id="games" class="content">
        <h2>Games</h2>
        <p>This is games</p>
    </div>

    <div id="stream" class="content">

        <h2>Stream</h2>
        <h3> Your ID: <span id="my-id">...loading...</span></h3>
        <button onclick="copyID()">Copy</button>

        <div style="margin: 10px 0;">
            <input type="text" id="remote-id" placeholder="Enter other person's ID">
            <button onclick="connectToOther()">Watch their screen</button>
        </div>

        <video class="video" id="preview" autoplay muted playsinline style="width: 100%; max-width: 800px; border-radius: 10px;"></video>
        <button id="share-button" onclick="startStream()">Share My Screen</button>

        <hr>
        <video class="video" id="remote-video" autoplay controls playsinline style="width: 100%; border: 2px solid white;"></video>
        <button onclick="stopWatchingStream()">Stop watching</button>
    </div>

    <div id="message-board" class="content">
        <h2>Message board</h2>
        <input class="message-board-input" type="text" id="message-board-name-input" placeholder="Enter name">
        <input class="message-board-input" type="text" id="message-board-message-input" placeholder="Enter message">
        <button class="message-board-button" onclick="sendMessage()">Send</button>
        <p class="messages" id="messages-container"></p>
    </div>


</body>
    <script src="tabber.js"></script>
    <script src="messageboard.js"></script>
    <script src="screenshare.js"></script>
</html>
